name: Build talk HTML pages

on:
  push:
    paths:
      - "_talks/*.md"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml markdown

      - name: Generate HTML
        run: python scripts/build_talks.py

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add talks/*.html
          git diff --cached --quiet || git commit -m "auto: regenerate talks HTML from markdown"
          git push
